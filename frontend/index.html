<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor DekoFacil - Catálogo & Stock</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DekoFacil</div>
        <div class="menu">
            <button id="btn-nuevo">+ Nuevo Producto</button>
        </div>
    </nav>

    <main class="container">
        <section class="filtros">
            <input type="text" id="buscador" placeholder="Buscar por nombre o SKU...">
            <select id="filtro-categoria">
                <option value="">Todas las categorías</option>
            </select>
        </section>

        <section id="catalogo" class="grid-productos">
            <div class="card-demo">
                <p>Cargando productos...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
